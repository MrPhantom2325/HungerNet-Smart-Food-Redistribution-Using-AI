networks:
  rescue_net:
    driver: bridge

volumes:
  mlflow_data:
  experiments_data:

services:
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.10.0
    container_name: food_rescue_mlflow
    networks: [rescue_net]
    ports:
      - "5000:5000"
    volumes:
      - mlflow_data:/mlruns
    command: >
      mlflow server
        --host 0.0.0.0
        --port 5000
        --backend-store-uri /mlruns
        --default-artifact-root /mlruns
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  train:
    build:
      context: .
      dockerfile: Dockerfile.train
    container_name: food_rescue_train
    networks: [rescue_net]
    depends_on:
      mlflow:
        condition: service_healthy
    volumes:
      - experiments_data:/app/experiments
    environment:
      - CONFIG=${CONFIG:-configs/qlearning_v1.yaml}
      - MLFLOW_TRACKING_URI=http://mlflow:5000

  serve:
    build:
      context: .
      dockerfile: Dockerfile.serve
    container_name: food_rescue_api
    networks: [rescue_net]
    depends_on:
      mlflow:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - experiments_data:/app/experiments
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
